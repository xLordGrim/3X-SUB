name: Build Custom 3x-ui
on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
  schedule:
    # Check daily at 06:00 UTC for new 3x-ui releases
    - cron: '0 6 * * *'

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      xui_tag: ${{ steps.check.outputs.xui_tag }}
    steps:
      - name: Check latest 3x-ui version
        id: check
        run: |
          # Get the latest 3x-ui release tag
          LATEST_TAG=$(curl -sL https://api.github.com/repos/MHSanaei/3x-ui/releases/latest | jq -r '.tag_name')
          LATEST_VER=$(echo "$LATEST_TAG" | sed 's/^v//')
          echo "Latest 3x-ui version: $LATEST_VER"

          # Get our last built version from the latest release body
          OUR_TAG=$(curl -sL https://api.github.com/repos/${{ github.repository }}/releases/latest 2>/dev/null | jq -r '.body // ""' | grep -oP 'xui-version: \K.*' || echo "")
          echo "Our last built version: $OUR_TAG"

          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            if [[ "$LATEST_VER" != "$OUR_TAG" && "$LATEST_VER" != "" ]]; then
              echo "New version detected! Triggering rebuild."
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "No new version. Skipping."
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Manual or push event. Triggering rebuild."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
          echo "xui_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: [check-update]
    if: needs.check-update.outputs.should_build == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout 3X-SUB
        uses: actions/checkout@v4
        with:
          path: 3X-SUB

      - name: Checkout 3x-ui (latest stable)
        uses: actions/checkout@v4
        with:
          repository: MHSanaei/3x-ui
          path: 3x-ui
          ref: ${{ needs.check-update.outputs.xui_tag }}

      - name: Detect 3x-ui version
        id: version
        run: |
          XUI_VER=$(cat 3x-ui/config/version | tr -d '[:space:]')
          echo "xui_version=$XUI_VER" >> $GITHUB_OUTPUT

          BRANCH="${GITHUB_REF_NAME:-development}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "release_tag=v${XUI_VER}" >> $GITHUB_OUTPUT
            echo "release_name=3X-SUB v${XUI_VER}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "release_tag=v${XUI_VER}-dev" >> $GITHUB_OUTPUT
            echo "release_name=3X-SUB v${XUI_VER}-dev" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          echo "--- Version Info ---"
          echo "3x-ui version: $XUI_VER"
          echo "Branch: $BRANCH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Inject 3X-SUB Theme (external CDN links)
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          BRANCH="${{ steps.version.outputs.branch }}"
          
          # For development, use commit SHA to bypass CDN caching issues
          # For main/stable, use the release tag
          if [[ "$BRANCH" == "main" ]]; then
            ASSET_VERSION="$RELEASE_TAG"
          else
            ASSET_VERSION="${{ github.sha }}"
          fi

          CSS_URL="https://cdn.jsdelivr.net/gh/xLordGrim/3X-SUB@${ASSET_VERSION}/web/assets/css/premium.css"
          JS_URL="https://cdn.jsdelivr.net/gh/xLordGrim/3X-SUB@${ASSET_VERSION}/web/assets/js/subscription.js"

          echo "CDN pinned to: $ASSET_VERSION"
          echo "CSS: $CSS_URL"
          echo "JS:  $JS_URL"

          python3 << PYEOF
          import re
          css_url = "${CSS_URL}"
          js_url = "${JS_URL}"

          with open('3x-ui/frontend/subpage.html', 'r') as f:
              content = f.read()

          # Strip stock Vue app tags to prevent 404 errors
          content = re.sub(r'<script type="module"[^>]*src="[^"]*subpage[^"]*"[^>]*></script>\s*', '', content)
          content = re.sub(r'<link rel="modulepreload"[^>]*>\s*', '', content)
          content = re.sub(r'<link rel="stylesheet" crossorigin[^>]*>\s*', '', content)

          # Inject CDN links
          head_inject = f'<link rel="stylesheet" href="{css_url}">\n  </head>'
          body_inject = f'''  <script>
              document.addEventListener('DOMContentLoaded', function() {{
                document.body.classList.add('premium-theme');
                var app = document.getElementById('app');
                if (app) app.style.display = 'none';
              }});
            </script>
            <script src="{js_url}"></script>
            </body>'''

          content = content.replace('</head>', head_inject, 1)
          content = content.replace('</body>', body_inject, 1)

          with open('3x-ui/frontend/subpage.html', 'w') as f:
              f.write(content)
          print("OK: subpage.html patched")
          PYEOF

          cat 3x-ui/frontend/subpage.html

      - name: Build Vue Frontend
        working-directory: 3x-ui/frontend
        run: |
          npm ci
          npm run build

      - name: Verify dist
        run: |
          echo "--- subpage.html in dist ---"
          cat 3x-ui/web/dist/subpage.html
          grep -c "cdn.jsdelivr.net" 3x-ui/web/dist/subpage.html && echo "✓ CDN links present" || echo "✗ CDN links MISSING"

      - name: Install Cross-Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Go Binary (AMD64)
        working-directory: 3x-ui
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o x-ui-linux-amd64 main.go

      - name: Build Go Binary (ARM64)
        working-directory: 3x-ui
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -ldflags "-s -w" -o x-ui-linux-arm64 main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-x-ui-binaries
          path: |
            3x-ui/x-ui-linux-amd64
            3x-ui/x-ui-linux-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_name }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          body: |
            Custom 3x-ui binary with [3X-SUB](https://github.com/xLordGrim/3X-SUB) premium subscription theme.

            **Base:** 3x-ui v${{ steps.version.outputs.xui_version }}
            **Channel:** ${{ steps.version.outputs.branch }}

            xui-version: ${{ steps.version.outputs.xui_version }}
          files: |
            3x-ui/x-ui-linux-amd64
            3x-ui/x-ui-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
