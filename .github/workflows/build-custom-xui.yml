name: Build Custom 3x-ui
on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 3X-SUB
        uses: actions/checkout@v4
        with:
          path: 3X-SUB

      - name: Checkout 3x-ui
        uses: actions/checkout@v4
        with:
          repository: MHSanaei/3x-ui
          path: 3x-ui

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Inject 3X-SUB Theme into Vue Source (BEFORE build)
        run: |
          echo "=== Injecting 3X-SUB theme into subpage.html INSIDE </head> and </body> ==="

          # 1. Copy assets into frontend/public so Vite copies them verbatim into dist/
          mkdir -p 3x-ui/frontend/public/premium
          cp 3X-SUB/web/assets/css/premium.css 3x-ui/frontend/public/premium/premium.css
          cp 3X-SUB/web/assets/js/subscription.js 3x-ui/frontend/public/premium/subscription.js

          # 2. Verify files exist
          echo "--- Assets to inject ---"
          ls -la 3x-ui/frontend/public/premium/

          # 3. Patch subpage.html using Python (reliable cross-platform, no sed escaping issues)
          python3 << 'PYEOF'
          with open('3x-ui/frontend/subpage.html', 'r') as f:
              content = f.read()

          head_inject = '<link rel="stylesheet" href="/premium/premium.css">\n  </head>'
          body_inject = '  <script>\n    document.body.classList.add("premium-theme");\n    var app = document.getElementById("app");\n    if (app) app.style.display = "none";\n  </script>\n  <script src="/premium/subscription.js"></script>\n  </body>'

          content = content.replace('</head>', head_inject, 1)
          content = content.replace('</body>', body_inject, 1)

          with open('3x-ui/frontend/subpage.html', 'w') as f:
              f.write(content)

          print("subpage.html patched successfully")
          PYEOF

          echo "--- subpage.html after patch ---"
          cat 3x-ui/frontend/subpage.html

      - name: Build Vue Frontend
        working-directory: 3x-ui/frontend
        run: |
          npm ci
          npm run build

      - name: Verify dist contents
        run: |
          echo "=== Checking dist folder structure ==="
          find 3x-ui/web/dist -type f | sort
          echo ""
          echo "=== Checking subpage.html in dist ==="
          cat 3x-ui/web/dist/subpage.html | grep -E "(premium|subscription|/assets/)" || echo "WARNING: premium assets not found in built subpage.html"

      - name: Build Go Binary (AMD64)
        working-directory: 3x-ui
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o x-ui-linux-amd64 main.go
          ls -lh x-ui-linux-amd64

      - name: Build Go Binary (ARM64)
        working-directory: 3x-ui
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o x-ui-linux-arm64 main.go
          ls -lh x-ui-linux-arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-x-ui-binaries
          path: |
            3x-ui/x-ui-linux-amd64
            3x-ui/x-ui-linux-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: "Custom 3x-ui Build"
          make_latest: true
          prerelease: false
          files: |
            3x-ui/x-ui-linux-amd64
            3x-ui/x-ui-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
