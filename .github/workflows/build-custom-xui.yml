name: Build Custom 3x-ui
on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 3X-SUB
        uses: actions/checkout@v4
        with:
          path: 3X-SUB

      - name: Checkout 3x-ui
        uses: actions/checkout@v4
        with:
          repository: MHSanaei/3x-ui
          path: 3x-ui

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Inject 3X-SUB Theme into Vue Source (BEFORE build)
        run: |
          echo "=== Injecting 3X-SUB theme into Vue source files ==="

          # 1. Copy premium.css into the frontend public folder so Vite
          #    copies it verbatim into dist/ at build time
          mkdir -p 3x-ui/frontend/public/premium
          cp 3X-SUB/web/assets/css/premium.css 3x-ui/frontend/public/premium/premium.css

          # 2. Copy our subscription.js into the frontend public folder too
          cp 3X-SUB/web/assets/js/subscription.js 3x-ui/frontend/public/premium/subscription.js

          # 3. Patch subpage.html (the Vite entry point) BEFORE the build.
          #    Vite will process this HTML and output a transformed subpage.html
          #    in dist/ with all asset URLs correctly resolved.
          cat >> 3x-ui/frontend/subpage.html << 'HTMLEOF'
          <!-- 3X-SUB Premium Theme -->
          <link rel="stylesheet" href="/premium/premium.css">
          <script>document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('premium-theme'); var app = document.getElementById('app'); if(app) app.style.display='none'; });</script>
          <script src="/premium/subscription.js"></script>
          HTMLEOF

          # Show what we injected so we can debug in CI logs
          echo "=== subpage.html after injection ==="
          cat 3x-ui/frontend/subpage.html

      - name: Build Vue Frontend
        working-directory: 3x-ui/frontend
        run: |
          npm ci
          npm run build

      - name: Verify dist contents
        run: |
          echo "=== Checking dist folder structure ==="
          find 3x-ui/web/dist -type f | sort
          echo "=== Checking premium assets were copied ==="
          ls -la 3x-ui/web/dist/premium/ || echo "MISSING: premium dir not in dist!"

      - name: Build Go Binary (AMD64)
        working-directory: 3x-ui
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o x-ui-linux-amd64 main.go

      - name: Build Go Binary (ARM64)
        working-directory: 3x-ui
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o x-ui-linux-arm64 main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-x-ui-binaries
          path: |
            3x-ui/x-ui-linux-amd64
            3x-ui/x-ui-linux-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: "Custom 3x-ui Build"
          make_latest: true
          prerelease: false
          files: |
            3x-ui/x-ui-linux-amd64
            3x-ui/x-ui-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
