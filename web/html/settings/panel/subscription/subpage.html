{{ template "page/head_start" .}}
<!-- Force Browser Cache Bypass -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<div id="premium-preloader">
    <div class="loader-logo">LG</div>
    <div class="loader-text">Initializing Premium UI</div>
</div>
<script src="{{ .base_path }}assets/qrcode/qrious2.min.js?{{ .cur_ver }}"></script>
<link rel="stylesheet" href="{{ .base_path }}assets/css/premium.css?{{ .cur_ver }}">
<script>
    window.__X_UI_BASE_PATH__ = "{{ .base_path }}";
    document.body.classList.add('premium-theme');
</script>
<style>
 
    body.premium-theme {
        background: #020617 !important;
        margin: 0;
        padding: 0;
        overflow: auto !important;
        overflow: auto !important;
        touch-action: manipulation;
        -webkit-overflow-scrolling: touch;
    }

    body.premium-theme #app {
        display: none !important;
    }

 
    body.premium-theme #premium-preloader {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.6s ease, visibility 0.6s;
    }

    .loader-logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: white;
        font-weight: bold;
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        animation: loader-pulse 2s infinite ease-in-out;
    }

    .loader-text {
        margin-top: 24px;
        color: #94a3b8;
        font-family: sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: loader-fade 2s infinite ease-in-out;
    }

    @keyframes loader-pulse {

        0%,
        100% {
            transform: scale(1);
            opacity: 0.8;
        }

        50% {
            transform: scale(1.1);
            opacity: 1;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.6);
        }
    }

    @keyframes loader-fade {

        0%,
        100% {
            opacity: 0.4;
        }

        50% {
            opacity: 1;
        }
    }

    .subscription-page .subscription-link-box {
        cursor: pointer;
        border-radius: 12px;
        padding: 25px 20px 15px 20px;
        margin-top: -12px;
        word-break: break-all;
        font-size: 13px;
        line-height: 1.5;
        text-align: left;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        transition: all 0.3s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .dark.subscription-page .subscription-link-box {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
    }

    .dark.subscription-page .subscription-link-box:hover {
        background: rgba(0, 0, 0, 0.3);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .light.subscription-page .subscription-link-box {
        background: rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(0, 0, 0, 0.08);
        color: rgba(0, 0, 0, 0.85);
    }

    .light.subscription-page .subscription-link-box:hover {
        background: rgba(0, 0, 0, 0.05);
        border-color: rgba(0, 0, 0, 0.14);
    }
</style>
{{ template "page/head_end" .}}

{{ template "page/body_start" .}}
 
<template id="subscription-data" data-sid="{{ .sId }}" data-sub-url="{{ .subUrl }}" data-subjson-url="{{ .subJsonUrl }}"
    data-download="{{ .download }}" data-upload="{{ .upload }}" data-used="{{ .used }}" data-total="{{ .total }}"
    data-remained="{{ .remained }}" data-expire="{{ .expire }}" data-lastonline="{{ .lastOnline }}"
    data-downloadbyte="{{ .downloadByte }}" data-uploadbyte="{{ .uploadByte }}" data-totalbyte="{{ .totalByte }}"
    data-datepicker="{{ .datepicker }}" data-isp="Detecting..." data-location="Unknown Region"
    data-ip="Self"></template>
<textarea id="subscription-links" style="display:none">{{ range .result }}{{ . }}
{{ end }}</textarea>
<script src="{{ .base_path }}assets/js/subscription.js?{{ .cur_ver }}"></script>

{{ template "page/body_end" .}}
